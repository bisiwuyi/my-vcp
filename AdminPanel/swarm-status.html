<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCP Agent Swarm - 集群状态监控</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: rgba(30, 41, 59, 0.7);
            --tertiary-bg: #1e293b;
            --accent-bg: rgba(51, 65, 85, 0.5);
            --primary-text: #f8fafc;
            --secondary-text: #94a3b8;
            --highlight-text: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.1);
            --online-color: #4ade80;
            --offline-color: #ef4444;
            --warning-color: #fbbf24;
            --running-color: #38bdf8;
            --pending-color: #fbbf24;
            --completed-color: #4ade80;
            --failed-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--primary-bg);
            color: var(--primary-text);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--secondary-bg);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #38bdf8, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title .material-symbols-outlined {
            font-size: 32px;
            color: var(--highlight-text);
        }

        .cluster-badge {
            padding: 6px 16px;
            background: var(--accent-bg);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--secondary-text);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--online-color);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--online-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--secondary-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stat-card-title {
            font-size: 0.85rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: var(--accent-bg);
        }

        .stat-card-icon .material-symbols-outlined {
            font-size: 20px;
            color: var(--highlight-text);
        }

        .stat-card-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card-subtitle {
            font-size: 0.8rem;
            color: var(--secondary-text);
        }

        .stat-card.online .stat-card-value { color: var(--online-color); }
        .stat-card.offline .stat-card-value { color: var(--offline-color); }
        .stat-card.running .stat-card-value { color: var(--running-color); }
        .stat-card.pending .stat-card-value { color: var(--pending-color); }
        .stat-card.completed .stat-card-value { color: var(--completed-color); }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--secondary-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title .material-symbols-outlined {
            font-size: 20px;
            color: var(--highlight-text);
        }

        .panel-body {
            padding: 16px 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .node-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .node-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--tertiary-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .node-item:hover {
            border-color: var(--highlight-text);
            background: var(--accent-bg);
        }

        .node-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .node-avatar.online {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(74, 222, 128, 0.1));
            color: var(--online-color);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .node-avatar.offline {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            color: var(--offline-color);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .node-info {
            flex: 1;
            min-width: 0;
        }

        .node-name {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .node-host {
            font-size: 0.8rem;
            color: var(--secondary-text);
        }

        .node-meta {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--secondary-text);
        }

        .node-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .node-meta .material-symbols-outlined {
            font-size: 14px;
        }

        .load-bar-container {
            width: 80px;
            flex-shrink: 0;
        }

        .load-bar {
            height: 8px;
            background: var(--accent-bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .load-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .load-bar-fill.low { background: var(--online-color); }
        .load-bar-fill.medium { background: var(--warning-color); }
        .load-bar-fill.high { background: var(--offline-color); }

        .load-text {
            font-size: 0.75rem;
            color: var(--secondary-text);
            text-align: center;
            margin-top: 4px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--tertiary-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: var(--highlight-text);
        }

        .task-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .task-status-dot.running { background: var(--running-color); box-shadow: 0 0 8px var(--running-color); }
        .task-status-dot.pending { background: var(--pending-color); }
        .task-status-dot.completed { background: var(--completed-color); }
        .task-status-dot.failed { background: var(--failed-color); }

        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-type {
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .task-id {
            font-size: 0.75rem;
            color: var(--secondary-text);
            font-family: monospace;
        }

        .task-node {
            font-size: 0.8rem;
            color: var(--secondary-text);
            padding: 4px 10px;
            background: var(--accent-bg);
            border-radius: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--secondary-text);
        }

        .empty-state .material-symbols-outlined {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .capability-tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent-bg);
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 4px;
            margin-top: 4px;
        }

        .strategy-selector {
            display: flex;
            gap: 8px;
        }

        .strategy-btn {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--secondary-text);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .strategy-btn:hover {
            border-color: var(--highlight-text);
            color: var(--highlight-text);
        }

        .strategy-btn.active {
            background: var(--highlight-text);
            border-color: var(--highlight-text);
            color: var(--primary-bg);
        }

        .refresh-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--secondary-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: var(--highlight-text);
            color: var(--highlight-text);
        }

        .refresh-btn .material-symbols-outlined {
            font-size: 18px;
        }

        .refresh-btn.spinning .material-symbols-outlined {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success { border-color: var(--completed-color); }
        .toast.error { border-color: var(--failed-color); }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-bg);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-text);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header-title">
                <span class="material-symbols-outlined">hive</span>
                <h1>VCP Agent Swarm</h1>
                <span class="cluster-badge" id="clusterName">vcp-swarm</span>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span>实时监控</span>
                </div>
                <button class="refresh-btn" id="refreshBtn" title="刷新数据">
                    <span class="material-symbols-outlined">refresh</span>
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card online">
                <div class="stat-card-header">
                    <span class="stat-card-title">在线节点</span>
                    <div class="stat-card-icon">
                        <span class="material-symbols-outlined">wifi</span>
                    </div>
                </div>
                <div class="stat-card-value" id="onlineNodes">0</div>
                <div class="stat-card-subtitle">共 <span id="totalNodes">0</span> 个节点</div>
            </div>
            <div class="stat-card running">
                <div class="stat-card-header">
                    <span class="stat-card-title">运行中任务</span>
                    <div class="stat-card-icon">
                        <span class="material-symbols-outlined">play_arrow</span>
                    </div>
                </div>
                <div class="stat-card-value" id="runningTasks">0</div>
                <div class="stat-card-subtitle">队列: <span id="pendingTasks">0</span></div>
            </div>
            <div class="stat-card completed">
                <div class="stat-card-header">
                    <span class="stat-card-title">已完成</span>
                    <div class="stat-card-icon">
                        <span class="material-symbols-outlined">check_circle</span>
                    </div>
                </div>
                <div class="stat-card-value" id="completedTasks">0</div>
                <div class="stat-card-subtitle">总任务: <span id="totalTasks">0</span></div>
            </div>
            <div class="stat-card offline">
                <div class="stat-card-header">
                    <span class="stat-card-title">失败任务</span>
                    <div class="stat-card-icon">
                        <span class="material-symbols-outlined">error</span>
                    </div>
                </div>
                <div class="stat-card-value" id="failedTasks">0</div>
                <div class="stat-card-subtitle">调度策略: <span id="strategy">least-loaded</span></div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">
                        <span class="material-symbols-outlined">dns</span>
                        节点状态
                    </span>
                </div>
                <div class="panel-body">
                    <div class="node-list" id="nodeList">
                        <div class="empty-state">
                            <span class="material-symbols-outlined">cloud_off</span>
                            <p>暂无节点数据</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">
                        <span class="material-symbols-outlined">task_alt</span>
                        任务队列
                    </span>
                </div>
                <div class="panel-body">
                    <div class="task-list" id="taskList">
                        <div class="empty-state">
                            <span class="material-symbols-outlined">inbox</span>
                            <p>暂无任务数据</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="material-symbols-outlined">info</span>
        <span id="toastMessage"></span>
    </div>

    <script>
        const API_BASE = '/admin_api';
        
        let clusterData = {
            clusterName: 'vcp-swarm',
            nodes: [],
            tasks: [],
            stats: {
                totalNodes: 0,
                onlineNodes: 0,
                offlineNodes: 0,
                totalTasks: 0,
                pendingTasks: 0,
                runningTasks: 0,
                completedTasks: 0,
                failedTasks: 0
            },
            strategy: 'least-loaded'
        };

        const mockNodes = [
            { id: 'n1', name: 'gateway-prod-1', host: '192.168.1.101', port: 3000, status: 'online', load: 35, maxLoad: 100, capabilities: ['router', 'auth', 'proxy'], lastHeartbeat: Date.now() },
            { id: 'n2', name: 'worker-ai-1', host: '192.168.1.102', port: 3000, status: 'online', load: 72, maxLoad: 100, capabilities: ['llm', 'embedding', 'rerank'], lastHeartbeat: Date.now() },
            { id: 'n3', name: 'worker-ai-2', host: '192.168.1.103', port: 3000, status: 'online', load: 18, maxLoad: 100, capabilities: ['llm', 'embedding'], lastHeartbeat: Date.now() - 5000 },
            { id: 'n4', name: 'storage-node-1', host: '192.168.1.104', port: 3000, status: 'online', load: 45, maxLoad: 100, capabilities: ['vector', 'cache', 'storage'], lastHeartbeat: Date.now() - 10000 },
            { id: 'n5', name: 'edge-cache-1', host: '192.168.1.105', port: 3000, status: 'offline', load: 0, maxLoad: 100, capabilities: ['cdn', 'cache'], lastHeartbeat: Date.now() - 120000 },
        ];

        const mockTasks = [
            { id: 't1', type: 'chat-completion', status: 'running', assignedNode: 'n2', priority: 8, createdAt: Date.now() - 30000 },
            { id: 't2', type: 'embedding-query', status: 'running', assignedNode: 'n3', priority: 5, createdAt: Date.now() - 15000 },
            { id: 't3', type: 'rag-retrieval', status: 'pending', assignedNode: null, priority: 6, createdAt: Date.now() - 8000 },
            { id: 't4', type: 'context-merge', status: 'pending', assignedNode: null, priority: 4, createdAt: Date.now() - 5000 },
            { id: 't5', type: 'chat-completion', status: 'completed', assignedNode: 'n1', priority: 7, createdAt: Date.now() - 120000, completedAt: Date.now() - 90000 },
            { id: 't6', type: 'vector-search', status: 'failed', assignedNode: 'n4', priority: 3, createdAt: Date.now() - 60000, error: 'Timeout after 30s' },
        ];

        async function fetchClusterStatus() {
            try {
                const response = await fetch(`${API_BASE}/swarm/status`);
                if (!response.ok) throw new Error('API unavailable');
                return await response.json();
            } catch (e) {
                console.warn('Using mock data:', e.message);
                return {
                    clusterName: 'vcp-swarm',
                    strategy: 'least-loaded',
                    nodes: mockNodes,
                    tasks: mockTasks,
                    stats: {
                        totalNodes: 5,
                        onlineNodes: 4,
                        offlineNodes: 1,
                        totalTasks: 6,
                        pendingTasks: 2,
                        runningTasks: 2,
                        completedTasks: 1,
                        failedTasks: 1
                    }
                };
            }
        }

        function getLoadClass(load, maxLoad) {
            const ratio = load / maxLoad;
            if (ratio < 0.5) return 'low';
            if (ratio < 0.8) return 'medium';
            return 'high';
        }

        function getInitials(name) {
            return name.split('-').map(p => p[0].toUpperCase()).join('').slice(0, 2);
        }

        function formatTime(timestamp) {
            const diff = Date.now() - timestamp;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            return `${Math.floor(diff / 3600000)}小时前`;
        }

        function renderNodes(nodes) {
            const container = document.getElementById('nodeList');
            
            if (!nodes || nodes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">cloud_off</span>
                        <p>暂无节点数据</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = nodes.map(node => `
                <div class="node-item">
                    <div class="node-avatar ${node.status}">${getInitials(node.name)}</div>
                    <div class="node-info">
                        <div class="node-name">
                            ${node.name}
                            <span style="font-size: 0.75rem; color: ${node.status === 'online' ? 'var(--online-color)' : 'var(--offline-color)'};">
                                ${node.status === 'online' ? '● 在线' : '○ 离线'}
                            </span>
                        </div>
                        <div class="node-host">${node.host}:${node.port}</div>
                        <div class="node-meta">
                            <span>
                                <span class="material-symbols-outlined">schedule</span>
                                ${formatTime(node.lastHeartbeat)}
                            </span>
                            <span>
                                <span class="material-symbols-outlined">memory</span>
                                负载 ${node.load}/${node.maxLoad}
                            </span>
                        </div>
                        <div style="margin-top: 8px;">
                            ${(node.capabilities || []).map(cap => `<span class="capability-tag">${cap}</span>`).join('')}
                        </div>
                    </div>
                    <div class="load-bar-container">
                        <div class="load-bar">
                            <div class="load-bar-fill ${getLoadClass(node.load, node.maxLoad)}" style="width: ${(node.load / node.maxLoad) * 100}%"></div>
                        </div>
                        <div class="load-text">${Math.round((node.load / node.maxLoad) * 100)}%</div>
                    </div>
                </div>
            `).join('');
        }

        function renderTasks(tasks) {
            const container = document.getElementById('taskList');
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">inbox</span>
                        <p>暂无任务数据</p>
                    </div>
                `;
                return;
            }

            const sortedTasks = [...tasks].sort((a, b) => {
                const statusOrder = { running: 0, pending: 1, completed: 2, failed: 3 };
                return statusOrder[a.status] - statusOrder[b.status];
            });

            container.innerHTML = sortedTasks.map(task => {
                const node = mockNodes.find(n => n.id === task.assignedNode);
                return `
                    <div class="task-item">
                        <div class="task-status-dot ${task.status}"></div>
                        <div class="task-info">
                            <div class="task-type">${task.type}</div>
                            <div class="task-id">${task.id} · 优先级 ${task.priority}</div>
                        </div>
                        ${node ? `<span class="task-node">${node.name}</span>` : ''}
                    </div>
                `;
            }).join('');
        }

        function updateStats(stats) {
            document.getElementById('onlineNodes').textContent = stats.onlineNodes;
            document.getElementById('totalNodes').textContent = stats.totalNodes;
            document.getElementById('runningTasks').textContent = stats.runningTasks;
            document.getElementById('pendingTasks').textContent = stats.pendingTasks;
            document.getElementById('completedTasks').textContent = stats.completedTasks;
            document.getElementById('failedTasks').textContent = stats.failedTasks;
            document.getElementById('totalTasks').textContent = stats.totalTasks;
            document.getElementById('clusterName').textContent = clusterData.clusterName;
            document.getElementById('strategy').textContent = clusterData.strategy;
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            try {
                const data = await fetchClusterStatus();
                clusterData = data;
                updateStats(data.stats);
                renderNodes(data.nodes);
                renderTasks(data.tasks);
                showToast('数据已刷新', 'success');
            } catch (e) {
                showToast('刷新失败: ' + e.message, 'error');
            } finally {
                btn.classList.remove('spinning');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.getElementById('refreshBtn').addEventListener('click', refreshData);

        setInterval(refreshData, 30000);

        refreshData();
    </script>
</body>
</html>
